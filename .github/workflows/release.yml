name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number, for example 1.2
        required: true
        type: string
      release_notes:
        description: User-facing release notes
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      KEYSTORE_BASE64: ${{ secrets.SETTINGSACCESS_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.SETTINGSACCESS_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.SETTINGSACCESS_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.SETTINGSACCESS_KEY_PASSWORD }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate version
        shell: bash
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Version must look like 1.2 or 1.2.3"
            exit 1
          fi

          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists"
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$VERSION"
          patch=${patch:-0}
          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))
          echo "VERSION_CODE=$version_code" >> "$GITHUB_ENV"

      - name: Build and lint
        run: ./gradlew clean lint assembleRelease --console=plain -PappVersionName="$VERSION" -PappVersionCode="$VERSION_CODE"

      - name: Sign APK
        shell: bash
        run: |
          keystore="$RUNNER_TEMP/settingsaccess.jks"
          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          aligned_apk="$RUNNER_TEMP/SettingsAccess-aligned.apk"
          signed_apk="$RUNNER_TEMP/SettingsAccess-v$VERSION.apk"
          build_tools=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore"
          "$build_tools/zipalign" -f -p 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$signed_apk" \
            "$aligned_apk"
          "$build_tools/apksigner" verify --verbose "$signed_apk"
          "$build_tools/aapt2" dump badging "$signed_apk" | grep -q "versionCode='$VERSION_CODE' versionName='$VERSION'"
          echo "SIGNED_APK=$signed_apk" >> "$GITHUB_ENV"

      - name: Publish release
        shell: bash
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          gh release create "v$VERSION" \
            "$SIGNED_APK#SettingsAccess-v$VERSION.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "SettingsAccess v$VERSION" \
            --notes-file "$notes_file"
